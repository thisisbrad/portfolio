<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" width="120" height="140">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700;800&amp;display=swap');

      .icon-label {
        font-family: 'Bricolage Grotesque', 'Arial Black', sans-serif;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 2px;
        text-transform: uppercase;
        fill: #0d0d0d;
      }

      /* Outer square entrance */
      .bg-sq {
        transform-origin: 60px 60px;
        animation: squareIn 0.45s cubic-bezier(0.34,1.4,0.64,1) both;
      }
      @keyframes squareIn {
        from { transform: scale(0.5); opacity: 0; }
        to   { transform: scale(1);   opacity: 1; }
      }

      /* Coral circle expands outward */
      .coral-ring-1 {
        transform-origin: 60px 60px;
        animation: ringExpand 0.5s 0.15s cubic-bezier(0.34,1.4,0.64,1) both;
      }
      .coral-ring-2 {
        transform-origin: 60px 60px;
        animation: ringExpand 0.5s 0.25s cubic-bezier(0.34,1.4,0.64,1) both;
      }
      .coral-ring-3 {
        transform-origin: 60px 60px;
        animation: ringExpand 0.5s 0.35s cubic-bezier(0.34,1.4,0.64,1) both;
      }
      .center-dot {
        transform-origin: 60px 60px;
        animation: ringExpand 0.4s 0.45s cubic-bezier(0.34,1.8,0.64,1) both;
      }
      @keyframes ringExpand {
        from { transform: scale(0); opacity: 0; }
        to   { transform: scale(1); opacity: 1; }
      }

      /* Crosshair lines draw in */
      .ch {
        stroke-dasharray: 12;
        stroke-dashoffset: 12;
        animation: drawCH 0.3s ease forwards;
      }
      .ch1 { animation-delay: 0.55s; }
      .ch2 { animation-delay: 0.6s; }
      .ch3 { animation-delay: 0.65s; }
      .ch4 { animation-delay: 0.7s; }
      @keyframes drawCH {
        to { stroke-dashoffset: 0; }
      }

      /* Continuous slow rotation on the outer coral circle — scanning */
      .scanning-ring {
        transform-origin: 60px 60px;
        animation:
          ringExpand 0.5s 0.15s cubic-bezier(0.34,1.4,0.64,1) both,
          spin 8s 0.65s linear infinite;
      }
      /* Dashed orbit ring that rotates */
      .orbit {
        transform-origin: 60px 60px;
        stroke-dasharray: 6 10;
        animation: spin 5s linear infinite;
        opacity: 0;
        animation: orbitIn 0.4s 0.8s ease forwards, spin 5s 1.2s linear infinite;
      }
      @keyframes orbitIn {
        to { opacity: 0.35; }
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }

      /* Hover: everything pulses faster */
      .icon-group { cursor: pointer; }
      .icon-group:hover .orbit {
        animation: spin 1.5s linear infinite;
        opacity: 0.6;
      }
      .icon-group:hover .center-dot {
        animation: dotPulse 0.6s ease infinite;
      }
      @keyframes dotPulse {
        0%, 100% { r: 5; }
        50%       { r: 8; }
      }

      .label-wrap {
        animation: fadeUp 0.4s 0.7s ease both;
      }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }
    </style>
    <clipPath id="sr-clip">
      <rect x="20" y="20" width="80" height="80"/>
    </clipPath>
  </defs>

  <g class="icon-group">

    <!-- Drop shadow -->
    <rect x="26" y="26" width="80" height="80" fill="#FF4D6A" opacity="0.25"/>

    <!-- Black background square -->
    <rect class="bg-sq" x="20" y="20" width="80" height="80" fill="#0d0d0d" stroke="#FF4D6A" stroke-width="3"/>

    <!-- Coral filled circle -->
    <circle class="scanning-ring" cx="60" cy="60" r="28" fill="#FF4D6A"/>

    <!-- Black ring -->
    <circle class="coral-ring-2" cx="60" cy="60" r="18" fill="none" stroke="#0d0d0d" stroke-width="4"/>

    <!-- Black inner -->
    <circle class="coral-ring-3" cx="60" cy="60" r="9"  fill="#0d0d0d"/>

    <!-- Coral center dot -->
    <circle class="center-dot" cx="60" cy="60" r="5" fill="#FF4D6A"/>

    <!-- Rotating dashed orbit ring -->
    <circle class="orbit" cx="60" cy="60" r="34" fill="none" stroke="#FF4D6A" stroke-width="1.5"/>

    <!-- Crosshair lines -->
    <line class="ch ch1" x1="60" y1="24" x2="60" y2="32" stroke="#f5f0e8" stroke-width="2.5" stroke-linecap="round"/>
    <line class="ch ch2" x1="60" y1="88" x2="60" y2="96" stroke="#f5f0e8" stroke-width="2.5" stroke-linecap="round"/>
    <line class="ch ch3" x1="24" y1="60" x2="32" y2="60" stroke="#f5f0e8" stroke-width="2.5" stroke-linecap="round"/>
    <line class="ch ch4" x1="88" y1="60" x2="96" y2="60" stroke="#f5f0e8" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Label -->
    <g class="label-wrap">
      <text x="60" y="125" text-anchor="middle" class="icon-label">The Search</text>
    </g>

  </g>
</svg>
