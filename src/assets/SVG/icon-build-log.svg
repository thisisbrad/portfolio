<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" width="120" height="140">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700;800&amp;display=swap');

      .icon-label {
        font-family: 'Bricolage Grotesque', 'Arial Black', sans-serif;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 2px;
        text-transform: uppercase;
        fill: #0d0d0d;
      }

      /* Green dot pulses — radar ping */
      .dot-ping {
        transform-origin: 108px 12px;
        animation: ping 2.2s ease-out infinite;
      }
      @keyframes ping {
        0%   { opacity: 1;   transform: scale(1); }
        70%  { opacity: 0;   transform: scale(2.6); }
        100% { opacity: 0;   transform: scale(2.6); }
      }

      /* Zigzag draws itself on load */
      .zz {
        stroke-dasharray: 60;
        stroke-dashoffset: 60;
        animation: draw 0.7s 0.3s cubic-bezier(0.4,0,0.2,1) forwards;
      }
      @keyframes draw {
        to { stroke-dashoffset: 0; }
      }

      /* Black inset square slides in from bottom-right */
      .inset-sq {
        transform-origin: 80px 80px;
        animation: slideIn 0.55s 0.15s cubic-bezier(0.34,1.56,0.64,1) both;
      }
      @keyframes slideIn {
        from { transform: translate(12px, 12px); opacity: 0; }
        to   { transform: translate(0, 0);       opacity: 1; }
      }

      /* Outer square: subtle rotate-wobble on hover, entrance scale */
      .outer-sq {
        transform-origin: 20px 20px;
        animation: popIn 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
      }
      @keyframes popIn {
        from { transform: scale(0.6) rotate(-6deg); opacity: 0; }
        to   { transform: scale(1)   rotate(0deg);  opacity: 1; }
      }

      /* Hover: whole icon lifts and shadow shifts */
      .icon-group {
        cursor: pointer;
        transition: filter 0.2s;
      }
      .icon-group:hover .outer-sq {
        animation: wobble 0.5s ease;
      }
      @keyframes wobble {
        0%   { transform: rotate(0deg); }
        25%  { transform: rotate(-4deg); }
        50%  { transform: rotate(4deg); }
        75%  { transform: rotate(-2deg); }
        100% { transform: rotate(0deg); }
      }
      .icon-group:hover .dot-ping {
        animation: ping 0.8s ease-out infinite;
      }

      /* Stripe lines fade in staggered */
      .stripe { opacity: 0; animation: fadeIn 0.3s ease forwards; }
      .s1 { animation-delay: 0.5s; }
      .s2 { animation-delay: 0.6s; }
      .s3 { animation-delay: 0.7s; }
      .s4 { animation-delay: 0.8s; }
      .s5 { animation-delay: 0.9s; }
      .s6 { animation-delay: 1.0s; }
      @keyframes fadeIn { to { opacity: 0.18; } }

      .label-wrap {
        animation: fadeUp 0.4s 0.6s ease both;
      }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }
    </style>

    <clipPath id="bl-clip">
      <rect x="20" y="20" width="80" height="80"/>
    </clipPath>
  </defs>

  <g class="icon-group">

    <!-- Drop shadow rect -->
    <rect x="26" y="26" width="80" height="80" fill="#0d0d0d" opacity="0.18"/>

    <!-- Outer yellow square -->
    <rect class="outer-sq" x="20" y="20" width="80" height="80" fill="#FFE600" stroke="#0d0d0d" stroke-width="3"/>

    <!-- Diagonal stripes -->
    <g clip-path="url(#bl-clip)">
      <line class="stripe s1" x1="10"  y1="40"  x2="60"  y2="-10" stroke="#0d0d0d" stroke-width="2"/>
      <line class="stripe s2" x1="10"  y1="65"  x2="85"  y2="-10" stroke="#0d0d0d" stroke-width="2"/>
      <line class="stripe s3" x1="10"  y1="90"  x2="100" y2="-10" stroke="#0d0d0d" stroke-width="2"/>
      <line class="stripe s4" x1="15"  y1="105" x2="105" y2="15"  stroke="#0d0d0d" stroke-width="2"/>
      <line class="stripe s5" x1="40"  y1="110" x2="105" y2="45"  stroke="#0d0d0d" stroke-width="2"/>
      <line class="stripe s6" x1="65"  y1="110" x2="105" y2="70"  stroke="#0d0d0d" stroke-width="2"/>
    </g>

    <!-- Black inset square -->
    <rect class="inset-sq" x="64" y="64" width="32" height="32" fill="#0d0d0d"/>

    <!-- Zigzag -->
    <polyline class="zz" points="20,65 32,53 44,65 56,53 68,65 80,53 92,65 100,55"
      fill="none" stroke="#0d0d0d" stroke-width="3"
      stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Green dot — static base -->
    <circle cx="108" cy="12" r="8" fill="#39FF14" stroke="#0d0d0d" stroke-width="2.5"/>

    <!-- Green dot — ping ring -->
    <circle class="dot-ping" cx="108" cy="12" r="8" fill="none" stroke="#39FF14" stroke-width="2"/>

    <!-- Label -->
    <g class="label-wrap">
      <text x="60" y="125" text-anchor="middle" class="icon-label">Build Log</text>
    </g>

  </g>
</svg>
