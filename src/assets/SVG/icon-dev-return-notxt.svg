<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <style>
      .bg-sq {
        transform-origin: 50px 50px;
        animation: popIn 0.45s cubic-bezier(0.34,1.4,0.64,1) both;
      }
      @keyframes popIn {
        from { transform: scale(0.6); opacity: 0; }
        to   { transform: scale(1); opacity: 1; }
      }
      .pip { opacity: 0; }
      .pip1 { animation: pipIn 0.2s 0.3s ease forwards; }
      .pip2 { animation: pipIn 0.2s 0.5s ease forwards; }
      .pip3 { animation: pipIn 0.2s 0.7s ease forwards; }
      .pip4 { animation: pipIn 0.2s 0.9s ease forwards, pipBlink 1.6s 1.1s ease-in-out infinite; }
      @keyframes pipIn { to { opacity: 1; } }
      @keyframes pipBlink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.15; }
      }
      .chev-1 {
        stroke-dasharray: 100;
        stroke-dashoffset: 100;
        animation: drawChev 0.45s 0.5s cubic-bezier(0.4,0,0.2,1) forwards;
      }
      .chev-2 {
        stroke-dasharray: 100;
        stroke-dashoffset: 100;
        animation: drawChev 0.45s 0.65s cubic-bezier(0.4,0,0.2,1) forwards;
      }
      @keyframes drawChev { to { stroke-dashoffset: 0; } }
      .pdot {
        transform-origin: 18px 82px;
        animation: bounceIn 0.5s 0.75s cubic-bezier(0.34,1.8,0.64,1) both;
      }
      @keyframes bounceIn {
        from { transform: scale(0); opacity: 0; }
        to   { transform: scale(1); opacity: 1; }
      }
      .icon-group { cursor: pointer; }
      .icon-group:hover .chev-1 { animation: march 0.6s ease infinite; }
      .icon-group:hover .chev-2 { animation: march 0.6s 0.15s ease infinite; }
      @keyframes march {
        0%   { transform: translateX(0);   opacity: 1; }
        60%  { transform: translateX(7px); opacity: 0.4; }
        61%  { transform: translateX(-4px); opacity: 0; }
        100% { transform: translateX(0);   opacity: 1; }
      }
      .icon-group:hover .pip3 { animation: flash 0.5s ease infinite; }
      @keyframes flash {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.2; }
      }
    </style>
  </defs>

  <g class="icon-group">
    <rect x="6" y="6" width="88" height="88" fill="#0d0d0d" opacity="0.15"/>
    <rect class="bg-sq" x="0" y="0" width="100" height="100" fill="#00E5FF" stroke="#0d0d0d" stroke-width="3"/>

    <!-- progress pips -->
    <rect class="pip pip1" x="8"  y="8" width="16" height="10" fill="#0d0d0d"/>
    <rect class="pip pip2" x="30" y="8" width="16" height="10" fill="#0d0d0d"/>
    <rect class="pip pip3" x="52" y="8" width="16" height="10" fill="#0d0d0d"/>
    <rect class="pip pip4" x="74" y="8" width="16" height="10" fill="#0d0d0d"/>

    <!-- bold chevron -->
    <polyline class="chev-1"
      points="12,72 50,34 88,72"
      fill="none" stroke="#0d0d0d" stroke-width="10"
      stroke-linecap="round" stroke-linejoin="round"/>

    <!-- ghost chevron -->
    <polyline class="chev-2"
      points="12,88 50,50 88,88"
      fill="none" stroke="#0d0d0d" stroke-width="4"
      stroke-linecap="round" stroke-linejoin="round"
      opacity="0.25"/>

    <!-- purple dot -->
    <circle class="pdot" cx="18" cy="82" r="7" fill="#C653FF" stroke="#0d0d0d" stroke-width="2.5"/>
  </g>
</svg>
